<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Manager</title>
    <link rel="stylesheet" href="../css/user_manager.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="page">

        <header class="topbar">
            <div class="topbar-right">
                <div class="topbar-icon mail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 6h16v12H4z" />
                        <path d="m4 7 8 6 8-6" />
                    </svg>
                    <span class="badge">2</span>
                </div>

                <div class="topbar-icon bell">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 17H9" />
                        <path d="M18 16V11a6 6 0 1 0-12 0v5l-2 2h16z" />
                        <path d="M10 19a2 2 0 0 0 4 0" />
                    </svg>
                </div>

                <img class="topbar-avatar" src="../img/Ellipse 6.png" alt="Admin avatar" />
            </div>
        </header>

        <div class="layout">

            <aside class="sidebar">
                <a href="../html/user_manager.html" class="menu-item active">
                    <span class="menu-icon">
                        <img src="../img/Users_Group.png" alt="">
                    </span>
                    <span>Manage Users</span>
                </a>

                <a href="../html/entries_manager.html" class="menu-item">
                    <span class="menu-icon">
                        <img src="../img/Book.png" alt="">
                    </span>
                    <span>Manage Entries</span>
                </a>

                <a href="../html/article-manager.html" class="menu-item">
                    <span class="menu-icon">
                        <img src="../img/Book_Open.png" alt="">
                    </span>
                    <span>Manage Article</span>
                </a>

                <a href="../html/login.html" class="menu-item logout">
                    <span class="menu-icon">
                        <img src="../img/Log_Out.png" alt="">
                    </span>
                    <span>Log out</span>
                </a>
            </aside>


            <main class="content">
                <div class="content-top">
                    <div class="title-card">
                        <h1>Team members</h1>
                        <span class="pill">100 users</span>
                    </div>

                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="7"></circle>
                            <path d="M20 20l-3.5-3.5"></path>
                        </svg>
                        <input type="text" placeholder="Search user" />
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th class="name-col">Name <span class="sort">AŽ</span></th>
                                <th class="status-col">Status <span class="arrow">↓</span></th>
                                <th class="email-col">Email address</th>
                                <th class="actions-col">Actions</th>
                            </tr>
                        </thead>

                        <tbody>
                            
                        </tbody>
                    </table>
                </div>
                <!-- id để check chặn -->
                <div id="toast-container"></div>
                <div class="pagination">
                    <button class="page-btn prev">
                        <span class="btn-arrow">←</span> Previous
                    </button>

                    <div class="pages">
                        <a href="#" class="page-num active">1</a>
                        <a href="#" class="page-num">2</a>
                        <a href="#" class="page-num">3</a>
                        <span class="dots">...</span>
                        <a href="#" class="page-num">8</a>
                        <a href="#" class="page-num">9</a>
                        <a href="#" class="page-num">10</a>
                    </div>

                    <button class="page-btn next">
                        Next <span class="btn-arrow">→</span>
                    </button>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/check-admin.js"></script>
    <script src="../js/user_manager.js"></script>
</body>

</html>
